<!DOCTYPE html>
<html>
<head>

<title>Wedding Venue</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Poppins;
background:#f8f8f8;
margin:0;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:#8b005d;
color:white;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}


/* HEADER */

.header{
text-align:center;
padding:50px;
background:#fff0f6;
}

.header h1{
font-size:40px;
color:#8b005d;
}


/* VENUE IMAGES */

.venue-gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:40px;
}

.venue-gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
transition:0.3s;
}

.venue-gallery img:hover{
transform:scale(1.05);
}


/* VENUE DETAILS */

.venue-details{
text-align:center;
padding:40px;
}

.venue-details h2{
color:#8b005d;
margin-bottom:10px;
}


/* MAP */

.map{
display:flex;
justify-content:center;
padding:40px;
}

iframe{
border-radius:10px;
width:80%;
height:350px;
}


/* FOOTER */

footer{
background:#8b005d;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<h2>❤️ Wedding ❤️</h2>

<div>

<a href="index.html">Home</a>
<a href="couple.html">Couple</a>
<a href="events.html">Events</a>
<a href="gallery.html">Gallery</a>
<a href="rsvp.html">RSVP</a>
<a href="venue.html">Venue</a>

</div>

</nav>


<!-- HEADER -->

<section class="header">

<h1>Wedding Venue</h1>

<p>We invite you to celebrate our special day</p>

</section>


<!-- VENUE IMAGES -->

<section class="venue-gallery">

<img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622">
<img src="https://images.unsplash.com/photo-1606800052052-a08af7148866">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
<img src="wedding venue.jpeg">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
<img src="weding vendon.jpeg">

</section>


<!-- VENUE DETAILS -->

<section class="venue-details">

<h2>Royal Palace Convention Hall</h2>

<p>Hyderabad, Telangana</p>

<p>Date: 25 December 2026</p>

<p>Time: 7:00 PM</p>

</section>


<!-- GOOGLE MAP -->

<section class="map">

<iframe
src="https://www.google.com/maps?q=hyderabad&output=embed"
loading="lazy">
</iframe>

</section>


<!-- FOOTER -->

<footer>

<p>We look forward to celebrating with you ❤️</p>

</footer>

</body>

</html>
