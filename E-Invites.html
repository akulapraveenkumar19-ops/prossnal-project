<style>
  /* Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Roboto', sans-serif;
  }

  /* Body with gradient background */
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fceabb, #f8b500);
    padding: 20px;
  }

  /* Glassmorphism invite card */
  .invite-card {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px 60px;
    text-align: center;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease forwards;
  }

  /* Fade-in animation */
  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(-20px);}
    100% { opacity: 1; transform: translateY(0);}
  }

  /* Heading styles */
  .invite-card h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3em;
    color: #fff;
    margin-bottom: 10px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }

  .invite-card h3 {
    color: #fff;
    font-weight: 400;
    margin-bottom: 30px;
  }

  /* Paragraph */
  .invite-card p {
    color: #fff;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Buttons */
  .invite-card a {
    text-decoration: none;
    color: #fff;
    background: #ff7f50;
    padding: 12px 25px;
    border-radius: 50px;
    font-weight: 500;
    margin: 10px;
    display: inline-block;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .invite-card a:hover {
    transform: scale(1.1);
    background: #ff4500;
  }

  /* Decorative images (optional) */
  .invite-card img.decor {
    width: 80px;
    margin: 20px 10px 0 10px;
  }

  /* Social Icons */
  .social-icons {
    margin-top: 25px;
  }

  .social-icons a img {
    width: 35px;
    margin: 0 8px;
    transition: transform 0.3s;
  }

  .social-icons a img:hover {
    transform: scale(1.2);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .invite-card {
      padding: 30px 20px;
    }

    .invite-card h1 {
      font-size: 2.5em;
    }
  }
